site_name: WebDevelopment Tools 2025-2026
site_url: https://gppovrm.github.io/ITMO_ICT_WebDevelopment_tools_2025-2026/
theme:
  name: material
  font:
    text: Merriweather Sans
    code: Red Hat Mono
  logo: assets/penguin.png
  favicon: assets/penguin.ico
  features:
    - navigation.footer
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

nav:
  - Главная: index.md
  - Лабораторная работа 1 (FastAPI):
    - Текст лабораторной работы: lab1/lab1.md
    - Практика 1.1: lab1/practice1_1.md
    - Практика 1.2: lab1/practice1_2.md
    - Практика 1.3: lab1/practice1_3.md
  - Лабораторная работа 2 (Потоки/Процессы/Async): lab2/lab2.md
  - Лабораторная работа 3 (Docker + Celery): lab3/lab3.md

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details

extra:
  social:
    - icon: simple/telegram
      link: https://t.me/Gppovrm
    - icon: simple/leetcode
      link: https://leetcode.com/u/gpp_ovrm/
    - icon: simple/github
      link: https://github.com/Gppovrm/ITMO_ICT_WebDevelopment_tools_2025-2026

